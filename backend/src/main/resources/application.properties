spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/culinary_discovery_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.sql.init.mode=always

server.port=${SERVER_PORT:8080}
